groups:
  - id: span.alibaba.gen_ai.invoke_workflow.client
    type: span
    stability: development
    span_kind: client
    brief: >
      Alibaba-specific extension for GenAI workflow invocation spans.
      Extends the standard gen_ai workflow span with Alibaba infrastructure attributes.
    note: |
      The `gen_ai.operation.name` SHOULD be `invoke_workflow`.

      **Span name** SHOULD be `invoke_workflow {gen_ai.workflow.name}` if `gen_ai.workflow.name` is readily available.
      When `gen_ai.workflow.name` is not available, it SHOULD be `invoke_workflow`.

      **Span kind** SHOULD be `CLIENT` and MAY be set to `INTERNAL` on spans representing
      invocation of workflows running in the same process.
    extends: span.gen_ai.invoke_workflow.client
    attributes:
      - ref: alibaba.base.env
        requirement_level: recommended
      - ref: alibaba.base.idc
        requirement_level: recommended
      - ref: alibaba.user.data
        requirement_level: opt_in
      - ref: alibaba.experiment.id
        requirement_level:
          conditionally_required: if applicable for RL-based workflows.
      - ref: alibaba.group.id
        requirement_level:
          conditionally_required: if applicable for RL-based workflows.
      - ref: alibaba.job.id
        requirement_level:
          conditionally_required: if applicable for RL-based workflows.

  - id: metric.alibaba.gen_ai.workflow.duration
    type: metric
    metric_name: gen_ai.workflow.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'GenAI workflow invocation duration with Alibaba infrastructure context.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: gen_ai.workflow.name
        requirement_level: required
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
      - ref: alibaba.base.env
        requirement_level: recommended
      - ref: alibaba.base.idc
        requirement_level: recommended

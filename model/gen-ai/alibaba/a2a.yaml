groups:
  - id: span.gen_ai.a2a.client
    type: span
    stability: development
    span_kind: client
    brief: >
      Describes Agent-to-Agent (A2A) protocol operation.
    note: |
      The `gen_ai.operation.name` SHOULD match the A2A operation being performed
      (e.g., `invoke_agent` for message/send, or use `gen_ai.a2a.rpc.method` as operation name).

      **Span name** SHOULD be `{gen_ai.a2a.rpc.method}` (e.g., `message/send`, `tasks/get`).

      A2A is a JSON-RPC based protocol for agent-to-agent communication.
      See https://github.com/google/A2A for protocol specification.
    extends: attributes.gen_ai.common.client
    attributes:
      - ref: gen_ai.provider.name
        requirement_level: required
        sampling_relevant: true
      - ref: gen_ai.a2a.rpc.method
        requirement_level: required
        sampling_relevant: true
      - ref: gen_ai.a2a.task.id
        requirement_level:
          conditionally_required: when task ID is available.
      - ref: gen_ai.a2a.task.state
        requirement_level:
          conditionally_required: when task state is available.
      - ref: gen_ai.a2a.protocol.version
        requirement_level: recommended
      - ref: gen_ai.a2a.streaming
        requirement_level: recommended
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"

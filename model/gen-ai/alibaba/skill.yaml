groups:
  - id: span.gen_ai.invoke_skill.client
    type: span
    stability: development
    span_kind: client
    brief: >
      Describes GenAI skill invocation.
    note: |
      The `gen_ai.operation.name` SHOULD be `invoke_skill`.

      **Span name** SHOULD be `invoke_skill {gen_ai.skill.name}` if `gen_ai.skill.name` is readily available.
      When `gen_ai.skill.name` is not available, it SHOULD be `invoke_skill`.

      Skills are reusable, self-contained capabilities that can be invoked by agents or workflows.

      This span type is optional. For the common pattern where skills are loaded
      through tool execution, instrumentations SHOULD use `execute_tool` span with
      `gen_ai.skill.*` attributes instead.
    extends: attributes.gen_ai.common.client
    attributes:
      - ref: gen_ai.provider.name
        requirement_level: required
        sampling_relevant: true
      - ref: gen_ai.operation.name
        sampling_relevant: true
      - ref: gen_ai.skill.id
        requirement_level:
          conditionally_required: if applicable.
      - ref: gen_ai.skill.name
        requirement_level:
          conditionally_required: when available.
      - ref: gen_ai.skill.version
        requirement_level: recommended
      - ref: gen_ai.skill.description
        requirement_level: recommended
      - ref: gen_ai.input.messages
        requirement_level: opt_in
      - ref: gen_ai.output.messages
        requirement_level: opt_in
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"

  - id: metric.gen_ai.skill.duration
    type: metric
    metric_name: gen_ai.skill.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'GenAI skill execution duration.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: gen_ai.skill.name
        requirement_level: required
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"

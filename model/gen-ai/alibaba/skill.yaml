groups:
  - id: span.alibaba.gen_ai.invoke_skill.client
    type: span
    stability: development
    span_kind: client
    brief: >
      Alibaba-specific extension for GenAI skill invocation spans.
      Extends the standard gen_ai skill span with Alibaba infrastructure attributes.
    note: |
      The `gen_ai.operation.name` SHOULD be `invoke_skill`.

      **Span name** SHOULD be `invoke_skill {gen_ai.skill.name}` if `gen_ai.skill.name` is readily available.
      When `gen_ai.skill.name` is not available, it SHOULD be `invoke_skill`.

      Skills are reusable, self-contained capabilities that can be invoked by agents or workflows.

      This span type is optional. For the common pattern where skills are loaded
      through tool execution, instrumentations SHOULD use `execute_tool` span with
      `gen_ai.skill.*` attributes instead.
    extends: span.gen_ai.invoke_skill.client
    attributes:
      - ref: alibaba.base.env
        requirement_level: recommended
      - ref: alibaba.base.idc
        requirement_level: recommended
      - ref: alibaba.user.data
        requirement_level: opt_in
      - ref: alibaba.experiment.id
        requirement_level:
          conditionally_required: if applicable for RL-trained skills.
      - ref: alibaba.group.id
        requirement_level:
          conditionally_required: if applicable for RL-trained skills.
      - ref: alibaba.job.id
        requirement_level:
          conditionally_required: if applicable for RL-trained skills.
      - ref: alibaba.instance.id
        requirement_level:
          conditionally_required: if applicable for RL-trained skills.

  - id: metric.alibaba.gen_ai.skill.duration
    type: metric
    metric_name: gen_ai.skill.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'GenAI skill execution duration with Alibaba infrastructure context.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: gen_ai.skill.name
        requirement_level: required
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
      - ref: alibaba.base.env
        requirement_level: recommended
      - ref: alibaba.base.idc
        requirement_level: recommended

groups:
  - id: metric_attributes.gen_ai
    type: attribute_group
    brief: 'This group describes GenAI metrics attributes'
    attributes:
      - ref: server.address
        brief: GenAI server address.
        requirement_level: recommended
      - ref: server.port
        brief: GenAI server port.
        requirement_level:
          conditionally_required: If `server.address` is set.
      - ref: gen_ai.response.model
        requirement_level: recommended
      - ref: gen_ai.request.model
        requirement_level:
          conditionally_required: If available.
      - ref: gen_ai.provider.name
        requirement_level: required
      - ref: gen_ai.operation.name
        requirement_level: required
  - id: metric_attributes.gen_ai.server
    type: attribute_group
    brief: 'This group describes GenAI server metrics attributes'
    extends: metric_attributes.gen_ai
    attributes:
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
        note: |
          The `error.type` SHOULD match the error code returned by the Generative AI service,
          the canonical name of exception that occurred, or another low-cardinality error identifier.
          Instrumentations SHOULD document the list of errors they report.
  - id: metric.gen_ai.client.token.usage
    type: metric
    metric_name: gen_ai.client.token.usage
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Number of input and output tokens used.'
    instrument: histogram
    unit: "{token}"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: gen_ai.token.type
        requirement_level: required
  - id: metric.gen_ai.client.operation.duration
    type: metric
    metric_name: gen_ai.client.operation.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'GenAI operation duration.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
        note: |
          The `error.type` SHOULD match the error code returned by the Generative AI provider or the client library,
          the canonical name of exception that occurred, or another low-cardinality error identifier.
          Instrumentations SHOULD document the list of errors they report.
  - id: metric.gen_ai.server.request.duration
    type: metric
    metric_name: gen_ai.server.request.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'Generative AI server request duration such as time-to-last byte or last output token.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai.server
  - id: metric.gen_ai.server.time_per_output_token
    type: metric
    metric_name: gen_ai.server.time_per_output_token
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'Time per output token generated after the first token for successful responses.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai
  - id: metric.gen_ai.server.time_to_first_token
    type: metric
    metric_name: gen_ai.server.time_to_first_token
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'Time to generate first token for successful responses.'
    instrument: histogram
    unit: "s"
    stability: development
    extends: metric_attributes.gen_ai

  - id: metric.gen_ai.client.time_to_first_token
    type: metric
    metric_name: gen_ai.client.time_to_first_token
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Time to generate the first token from the client perspective, including network latency.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"

  - id: metric.gen_ai.client.time_per_output_token
    type: metric
    metric_name: gen_ai.client.time_per_output_token
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Average time per output token from the client perspective, including network latency.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"

  - id: metric.gen_ai.workflow.duration
    type: metric
    metric_name: gen_ai.workflow.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'GenAI workflow invocation duration.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: gen_ai.workflow.name
        requirement_level: required
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"

  - id: metric.gen_ai.skill.duration
    type: metric
    metric_name: gen_ai.skill.duration
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'GenAI skill execution duration.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai
    attributes:
      - ref: gen_ai.skill.name
        requirement_level: required
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"

  - id: metric.gen_ai.server.prompt_tokens
    type: metric
    metric_name: gen_ai.server.prompt_tokens
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Number of prompt/input tokens processed by the inference engine.'
    instrument: counter
    unit: "{token}"
    stability: development
    extends: metric_attributes.gen_ai.server

  - id: metric.gen_ai.server.generation_tokens
    type: metric
    metric_name: gen_ai.server.generation_tokens
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Number of generation/output tokens produced by the inference engine.'
    instrument: counter
    unit: "{token}"
    stability: development
    extends: metric_attributes.gen_ai.server

  - id: metric.gen_ai.server.cached_tokens
    type: metric
    metric_name: gen_ai.server.cached_tokens
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Number of tokens served from cache by the inference engine.'
    instrument: histogram
    unit: "{token}"
    stability: development
    extends: metric_attributes.gen_ai.server

  - id: metric.gen_ai.server.num_requests_running
    type: metric
    metric_name: gen_ai.server.num_requests_running
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Number of requests currently being processed by the inference engine.'
    instrument: gauge
    unit: "{request}"
    stability: development
    extends: metric_attributes.gen_ai.server

  - id: metric.gen_ai.server.num_requests_waiting
    type: metric
    metric_name: gen_ai.server.num_requests_waiting
    annotations:
      code_generation:
        metric_value_type: int
    brief: 'Number of requests waiting to be processed by the inference engine.'
    instrument: gauge
    unit: "{request}"
    stability: development
    extends: metric_attributes.gen_ai.server

  - id: metric.gen_ai.server.e2e_request_latency
    type: metric
    metric_name: gen_ai.server.e2e_request_latency
    annotations:
      code_generation:
        metric_value_type: double
    brief: 'End-to-end request latency including queue time and processing time.'
    instrument: histogram
    unit: "ms"
    stability: development
    extends: metric_attributes.gen_ai.server
